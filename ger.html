<!doctype html>
<html lang="en">      
<head>
<title>Document</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
<button id="add" class="bg-blue-500 text-white font-bold py-2 px-4 rounded">Add Element</button>
<div id="container" class="grid grid-cols-3 gap-4 mt-4"></div>
<script>
document.getElementById('add').addEventListener('click', function() {
    var new = document.createElement('div');
    new.textContent = 'Product';
    new.className = 'bg-green-500 p-4 rounded flex justify-between items-center';
    var remove = document.createElement('button');
    remove.textContent = 'Remove';
    remove.className = 'bg-red-500 hover:bg-red-700 text-white py-1 px-2 rounded';
    remove.addEventListener('click', function() {
        new.remove();
    });
});
</script>
</body>
</html>

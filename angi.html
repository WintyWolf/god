<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="flex justify-center items-center flex-col">
    <p class="too">0</p>
    <div class="flex space-x-4">
    <button onclick="plus()" class="bg-blue-500 text-white py-2 px-4 rounded">+</button>
    <button onclick="minus()" class="bg-red-500 text-white py-2 px-4 rounded">-</button>
    </div>
    <script>
        let a = 0;
        function plus(){
            const too= document.querySelector(".too").innerText;
            a=a+1;
            document.querySelector(".too").innerText = a;

            }
        function minus(){
          const too= document.querySelector(".too").innerText;
            a=a-1;
            document.querySelector(".too").innerText = a;
        }
    </script>
  </body>
</html>
